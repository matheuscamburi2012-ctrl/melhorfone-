<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e63329"/>
      <stop offset="100%" style="stop-color:#b8251c"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Smartphone body -->
  <rect x="4" y="6" width="30" height="48" rx="5" ry="5" fill="url(#grad)" filter="url(#shadow)"/>
  <!-- tela -->
  <rect x="7" y="12" width="24" height="32" rx="2" fill="#fff" opacity="0.15"/>
  <rect x="7" y="12" width="24" height="32" rx="2" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
  <!-- notch -->
  <rect x="14" y="8" width="10" height="2.5" rx="1.2" fill="#fff" opacity="0.4"/>
  <!-- botão home -->
  <circle cx="19" cy="48" r="2.5" fill="#fff" opacity="0.4"/>
  <!-- ícone estrela / melhor -->
  <text x="19" y="33" font-size="14" text-anchor="middle" fill="#fff" opacity="0.95" font-family="sans-serif">★</text>

  <!-- Texto: Melhor -->
  <text x="44" y="29" font-family="'Segoe UI',Arial,sans-serif" font-size="21" font-weight="900" fill="#1a1a1a" letter-spacing="-0.5">Melhor</text>
  <!-- Texto: FONE -->
  <text x="44" y="50" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="700" fill="url(#grad)" letter-spacing="4">FONE</text>

  <!-- Linha decorativa -->
  <line x1="44" y1="33" x2="232" y2="33" stroke="#e63329" stroke-width="1.5" opacity="0.2"/>
</svg>
